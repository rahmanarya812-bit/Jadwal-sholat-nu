<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jadwal Sholat NU — Vercel</title>
  <style>
    :root{
      --bg:#f4f6f8;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e5e7eb;
      --teal:#0ea5a5;
      --teal-weak:#c7f3ee;
      --chip:#f1f5f9;
      --shadow: 0 8px 20px rgba(15, 23, 42, .08);
      --radius: 18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:var(--bg);color:var(--text);}
    .container{max-width:1180px;margin:0 auto;padding:18px 14px 40px;}

    .settings{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
    .field{display:flex;flex-direction:column;gap:6px;}
    label{font-size:12px;color:var(--muted)}
    select, input, button.action{border:1px solid var(--line);background:white;padding:10px 10px;border-radius:14px;font-size:14px;outline:none;}
    button.action{background:#0f766e;color:white;border-color:rgba(15,118,110,.4);font-weight:800;cursor:pointer;}
    button.action:active{transform:translateY(1px);}
    .hint{font-size:12px;color:var(--muted);margin-top:8px;}

    .topCard{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:18px 18px 14px;}
    .topRow{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;}
    .headline{display:flex;flex-direction:column;gap:6px;min-width:320px;}
    .bigLine{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;}
    .bigLine .name,.bigLine .time{font-size:34px;font-weight:800;letter-spacing:.2px;line-height:1.1;}
    .bigLine .tz,.bigLine .count{font-size:16px;font-weight:700;color:var(--muted);}
    .loc{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:14px;}
    .pin{width:10px;height:10px;background:#ef4444;border-radius:999px;box-shadow:0 0 0 3px rgba(239,68,68,.15);}

    .datePill{display:flex;align-items:center;gap:10px;background:#f8fafc;border:1px solid var(--line);border-radius:999px;padding:10px 14px;min-width:220px;justify-content:space-between;}
    .datePill .main{display:flex;flex-direction:column;gap:2px;}
    .datePill .g{font-weight:800;font-size:16px;}
    .datePill .h{font-size:12px;color:var(--muted);}
    .chevBtn{border:none;background:var(--chip);width:34px;height:34px;border-radius:999px;cursor:pointer;font-weight:900;color:#0f766e;}
    .chevBtn:active{transform:translateY(1px);}

    .chips{margin-top:14px;display:grid;grid-template-columns:repeat(8,minmax(120px,1fr));gap:10px;}
    @media (max-width:1100px){.chips{grid-template-columns:repeat(4,minmax(140px,1fr));}}
    @media (max-width:560px){.chips{grid-template-columns:repeat(2,minmax(140px,1fr));}.bigLine .name,.bigLine .time{font-size:28px;}}
    .chip{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:10px 12px;display:flex;flex-direction:column;gap:6px;min-height:74px;}
    .chip .t{font-weight:800;font-size:16px;letter-spacing:.2px;}
    .chip .n{font-size:13px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;gap:10px;}
    .chip.active{background:var(--teal-weak);border-color:rgba(14,165,165,.35);}

    .monthWrap{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:14px 0 8px;overflow:hidden;}
    .monthHeader{padding:4px 18px 10px;display:flex;justify-content:center;align-items:center;gap:14px;}
    .monthTitle{text-align:center;display:flex;flex-direction:column;gap:2px;min-width:240px;}
    .monthTitle .m{font-size:20px;font-weight:900;}
    .monthTitle .hm{font-size:13px;color:var(--muted);}

    .tableWrap{overflow:auto;border-top:1px solid var(--line);}
    table{width:100%;border-collapse:collapse;min-width:980px;}
    thead th{background:var(--teal);color:white;padding:12px 12px;text-align:center;font-size:13px;font-weight:800;position:sticky;top:0;z-index:2;}
    tbody td{padding:12px 12px;border-bottom:1px solid var(--line);text-align:center;font-size:13px;font-weight:650;}
    tbody tr:nth-child(even) td{background:#fbfdff;}
    tbody tr.today td{background:rgba(14,165,165,.12)!important;}
    tbody td.left{text-align:left;font-weight:800;}
  </style>
</head>
<body>
  <div class="container">

    <div class="settings">
      <div class="field" style="min-width:220px">
        <label>Provinsi</label>
        <select id="provSelect"></select>
      </div>
      <div class="field" style="min-width:220px">
        <label>Kab/Kota</label>
        <select id="kabSelect"></select>
      </div>
      <div class="field" style="min-width:160px">
        <label>Zona Waktu</label>
        <select id="tzSelect">
          <option value="7">WIB (UTC+7)</option>
          <option value="8">WITA (UTC+8)</option>
          <option value="9">WIT (UTC+9)</option>
        </select>
      </div>
      <div class="field" style="min-width:140px">
        <label>Bulan</label>
        <select id="monthSelect"></select>
      </div>
      <div class="field" style="min-width:120px">
        <label>Tahun</label>
        <select id="yearSelect"></select>
      </div>
     <button class="action" id="loadBtn">Muat Jadwal</button>
<button class="action" id="gpsBtn" style="background:#0ea5a5;border-color:rgba(14,165,165,.4)">
  Pakai GPS
</button>
    </div>
    <div class="hint" id="statusText">Memuat provinsi…</div>

    <div class="topCard" style="margin-top:12px">
      <div class="topRow">
        <div class="headline">
          <div class="bigLine">
            <div class="name" id="activePrayerName">-</div>
            <div class="time" id="activePrayerTime">--:--</div>
            <div class="tz" id="tzLabel">WIB</div>
            <div class="count" id="countdownText">- --:--:--</div>
          </div>
          <div class="loc">
            <span class="pin"></span>
            <span id="dayLocation">-</span>
          </div>
        </div>

        <div class="datePill">
          <button class="chevBtn" id="dayPrevBtn" title="Hari sebelumnya">‹</button>
          <div class="main">
            <div class="g" id="gregDatePill">-</div>
            <div class="h" id="hijriDatePill">-</div>
          </div>
          <button class="chevBtn" id="dayNextBtn" title="Hari berikutnya">›</button>
        </div>
      </div>

      <div class="chips" id="prayerChips"></div>
    </div>

    <div class="monthWrap">
      <div class="monthHeader">
        <button class="chevBtn" id="monthPrevBtn" title="Bulan sebelumnya">‹</button>
        <div class="monthTitle">
          <div class="m" id="monthTitle">-</div>
          <div class="hm" id="monthHijriTitle">-</div>
        </div>
        <button class="chevBtn" id="monthNextBtn" title="Bulan berikutnya">›</button>
      </div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Hari</th>
              <th>Hijriah</th>
              <th>Masehi</th>
              <th>Imsak</th>
              <th>Subuh</th>
              <th>Terbit</th>
              <th>Dhuha</th>
              <th>Zuhur</th>
              <th>Ashar</th>
              <th>Maghrib</th>
              <th>Isya</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

  </div>

<script>
  // ✅ penting: API_BASE pakai proxy Vercel
  const API_BASE = "/api/shalat";

  const el = (id) => document.getElementById(id);
  const pad2 = (n) => String(n).padStart(2,"0");

  const state = {
    provinces: [],
    kabByProv: new Map(),
    jadwal: [],
    tzOffset: 7,
    prov: null,
    kab: null,
    viewDateISO: null,
    timer: null,
  };

  // ✅ fungsi proxy (ini yang kamu tanya “taruh dimana”)
  async function apiGetProvinsi(){
    const res = await fetch(`${API_BASE}?type=provinsi`);
    if(!res.ok) throw new Error("Gagal fetch provinsi");
    return res.json();
  }

  async function apiPostKab(body){
    const res = await fetch(`${API_BASE}?type=kabkota`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(body)
    });
    if(!res.ok) throw new Error("Gagal fetch kab/kota");
    return res.json();
  }

  async function apiPostJadwal(body){
    const res = await fetch(`${API_BASE}`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(body)
    });
    if(!res.ok) throw new Error("Gagal fetch jadwal");
    return res.json();
  }

  function tzShortLabel(off){
    off = Number(off);
    if(off===7) return "WIB";
    if(off===8) return "WITA";
    if(off===9) return "WIT";
    return `UTC+${off}`;
  }

  function nowPartsInOffset(offsetHours){
    const d = new Date(Date.now() + offsetHours*3600e3);
    return {
      y: d.getUTCFullYear(),
      m: d.getUTCMonth()+1,
      d: d.getUTCDate(),
      hh: d.getUTCHours(),
      mm: d.getUTCMinutes(),
      ss: d.getUTCSeconds(),
      iso: `${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}-${pad2(d.getUTCDate())}`
    };
  }

  function isoToDateParts(iso){
    const [y,m,d] = iso.split("-").map(Number);
    const dt = new Date(Date.UTC(y, m-1, d));
    return {y,m,d, dt};
  }

  function addDaysISO(iso, delta){
    const {dt} = isoToDateParts(iso);
    dt.setUTCDate(dt.getUTCDate() + delta);
    return `${dt.getUTCFullYear()}-${pad2(dt.getUTCMonth()+1)}-${pad2(dt.getUTCDate())}`;
  }

  function dayNameIDFromUTCDate(dt){
    const names = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
    return names[dt.getUTCDay()];
  }

  function monthNameID(m){
    return ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"][m-1];
  }

  function formatGregID(dtUTC){
    return new Intl.DateTimeFormat("id-ID",{day:"numeric", month:"long", year:"numeric", timeZone:"UTC"}).format(dtUTC);
  }

  function formatHijriID(dtUTC){
    return new Intl.DateTimeFormat("id-ID-u-ca-islamic", {day:"numeric", month:"long", year:"numeric", timeZone:"UTC"}).format(dtUTC);
  }

  function hijriDayNumber(dtUTC){
    const parts = new Intl.DateTimeFormat("en-US-u-ca-islamic", {day:"numeric", timeZone:"UTC"}).formatToParts(dtUTC);
    const d = parts.find(p=>p.type==="day")?.value;
    return d ? Number(d) : null;
  }

  async function loadProvinces(){
    el("statusText").textContent = "Memuat provinsi…";
    const data = await apiGetProvinsi();
    state.provinces = data?.data || [];

    if(state.provinces.length === 0){
      throw new Error("List provinsi kosong (API error / proxy error)");
    }

    const s = el("provSelect");
    s.innerHTML = "";
    state.provinces.forEach(p=>{
      const opt = document.createElement("option");
      opt.value = p.provinsi;
      opt.textContent = p.provinsi;
      s.appendChild(opt);
    });
    el("statusText").textContent = "Siap.";
  }

  async function loadKabkota(prov){
    if(state.kabByProv.has(prov)) return state.kabByProv.get(prov);
    el("statusText").textContent = "Memuat kab/kota…";
    const data = await apiPostKab({ provinsi: prov });
    const list = data?.data || [];
    state.kabByProv.set(prov, list);
    el("statusText").textContent = "Siap.";
    return list;
  }

  async function renderKabSelect(prov){
    const list = await loadKabkota(prov);
    const s = el("kabSelect");
    s.innerHTML = "";
    list.forEach(k=>{
      const opt = document.createElement("option");
      opt.value = k.kabkota;
      opt.textContent = k.kabkota;
      s.appendChild(opt);
    });
  }

  function initMonthYear(){
    const ms = el("monthSelect");
    const ys = el("yearSelect");
    ms.innerHTML = "";
    ys.innerHTML = "";

    for(let i=1;i<=12;i++){
      const opt = document.createElement("option");
      opt.value = String(i);
      opt.textContent = monthNameID(i);
      ms.appendChild(opt);
    }
    const yNow = new Date().getFullYear();
    for(let y=yNow-1;y<=yNow+2;y++){
      const opt = document.createElement("option");
      opt.value = String(y);
      opt.textContent = String(y);
      ys.appendChild(opt);
    }
  }

  function setDefaultMonthYearByTZ(){
    const now = nowPartsInOffset(Number(el("tzSelect").value));
    el("monthSelect").value = String(now.m);
    el("yearSelect").value = String(now.y);
  }

  function secondsOf(hhmm){
    const [h,m] = hhmm.split(":").map(Number);
    return h*3600 + m*60;
  }

  function hms(total){
    total = Math.max(0, Math.floor(total));
    const hh = Math.floor(total/3600);
    const mm = Math.floor((total%3600)/60);
    const ss = total%60;
    return `${pad2(hh)}:${pad2(mm)}:${pad2(ss)}`;
  }

  function normalizeRow(row){
    return {
      tanggal: row.tanggal || row.date,
      imsak: row.imsak,
      subuh: row.subuh,
      terbit: row.terbit,
      dhuha: row.dhuha,
      zuhur: row.zuhur || row.dzuhur,
      ashar: row.ashar,
      maghrib: row.maghrib,
      isya: row.isya
    };
  }

  async function fetchMonth(){
    state.prov = el("provSelect").value;
    state.kab = el("kabSelect").value;
    state.tzOffset = Number(el("tzSelect").value);

    const month = Number(el("monthSelect").value);
    const year = Number(el("yearSelect").value);

    el("statusText").textContent = "Memuat jadwal bulan…";

    const data = await apiPostJadwal({
      provinsi: state.prov,
      kabkota: state.kab,
      bulan: month,
      tahun: year
    });

    state.jadwal = (data?.data?.jadwal || []).map(normalizeRow);

    const now = nowPartsInOffset(state.tzOffset);
    state.viewDateISO = `${year}-${pad2(month)}-${pad2(now.d)}`;

    renderMonthTitle(month, year);
    renderTable();
    renderTop();

    el("statusText").textContent = "Siap.";
  }

  function renderMonthTitle(month, year){
    el("monthTitle").textContent = `${monthNameID(month)} ${year}`;
    const dt = new Date(Date.UTC(year, month-1, 15));
    // label ringkas bulan hijriah (tanpa hari)
    el("monthHijriTitle").textContent = formatHijriID(dt).replace(/^\d+\s/, "");
  }

  function renderTable(){
    const tbody = el("tbody");
    tbody.innerHTML = "";

    const now = nowPartsInOffset(state.tzOffset);
    const todayISO = `${now.y}-${pad2(now.m)}-${pad2(now.d)}`;

    for(const r0 of state.jadwal){
      const r = normalizeRow(r0);
      if(!r.tanggal) continue;

      const iso = r.tanggal;
      const {dt} = isoToDateParts(iso);

      const hijriDay = hijriDayNumber(dt);

      const tr = document.createElement("tr");
      if(iso === todayISO) tr.classList.add("today");

      const cells = [
        {v: dayNameIDFromUTCDate(dt), cls:"left"},
        {v: hijriDay ? pad2(hijriDay) : "-", cls:""},
        {v: pad2(dt.getUTCDate()), cls:""},
        {v: r.imsak},
        {v: r.subuh},
        {v: r.terbit},
        {v: r.dhuha},
        {v: r.zuhur},
        {v: r.ashar},
        {v: r.maghrib},
        {v: r.isya},
      ];

      for(const c of cells){
        const td = document.createElement("td");
        td.textContent = c.v || "-";
        if(c.cls) td.classList.add(c.cls);
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
  }

  function findRowByISO(iso){
    return state.jadwal.find(r => r.tanggal === iso) || null;
  }

  function computeActivePrayer(row, offset){
    if(!row) return null;

    const now = nowPartsInOffset(offset);
    const nowSec = now.hh*3600 + now.mm*60 + now.ss;

    const items = [
      ["Imsak", row.imsak],
      ["Subuh", row.subuh],
      ["Terbit", row.terbit],
      ["Dhuha", row.dhuha],
      ["Zuhur", row.zuhur],
      ["Ashar", row.ashar],
      ["Maghrib", row.maghrib],
      ["Isya", row.isya],
    ].filter(x => x[1] && x[1].includes(":"));

    for(const [name, time] of items){
      const tSec = secondsOf(time);
      if(tSec > nowSec) return {name, time, countdown: tSec - nowSec};
    }

    const first = items[0];
    if(first){
      const tSec = secondsOf(first[1]);
      return {name: first[0], time: first[1], countdown: (24*3600 - nowSec) + tSec, isTomorrow:true};
    }
    return null;
  }

  function renderTop(){
    const row = findRowByISO(state.viewDateISO);
    const {dt} = isoToDateParts(state.viewDateISO);

    el("dayLocation").textContent = `${dayNameIDFromUTCDate(dt)}, ${state.kab}`;
    el("gregDatePill").textContent = formatGregID(dt);
    el("hijriDatePill").textContent = formatHijriID(dt);

    const wrap = el("prayerChips");
    wrap.innerHTML = "";

    if(!row){
      wrap.innerHTML = `<div style="grid-column:1/-1;color:#ef4444;font-weight:800;padding:10px">
        Data tanggal ini tidak tersedia (pastikan bulan/tahun sesuai).
      </div>`;
      return;
    }

    const items = [
      ["Imsak", row.imsak],
      ["Subuh", row.subuh],
      ["Terbit", row.terbit],
      ["Dhuha", row.dhuha],
      ["Zuhur", row.zuhur],
      ["Ashar", row.ashar],
      ["Maghrib", row.maghrib],
      ["Isya", row.isya],
    ];

    const active = computeActivePrayer(row, state.tzOffset);

    items.forEach(([name, time])=>{
      const chip = document.createElement("div");
      chip.className = "chip";
      if(active && active.name === name && !active.isTomorrow) chip.classList.add("active");
      chip.innerHTML = `
        <div class="t">${time || "--:--"} <span style="font-size:12px;color:var(--muted);font-weight:900">${tzShortLabel(state.tzOffset)}</span></div>
        <div class="n"><span>${name}</span><span style="opacity:.7">☁︎</span></div>
      `;
      wrap.appendChild(chip);
    });

    el("tzLabel").textContent = tzShortLabel(state.tzOffset);
    if(active){
      el("activePrayerName").textContent = active.name;
      el("activePrayerTime").textContent = active.time;
      el("countdownText").textContent = `${active.isTomorrow ? "— besok" : "—"} ${hms(active.countdown)}`;
    }else{
      el("activePrayerName").textContent = "-";
      el("activePrayerTime").textContent = "--:--";
      el("countdownText").textContent = "- --:--:--";
    }
  }

  function startTicker(){
    if(state.timer) clearInterval(state.timer);
    state.timer = setInterval(()=>{
      const row = findRowByISO(state.viewDateISO);
      if(!row) return;

      const active = computeActivePrayer(row, state.tzOffset);
      if(active){
        el("activePrayerName").textContent = active.name;
        el("activePrayerTime").textContent = active.time;
        el("countdownText").textContent = `${active.isTomorrow ? "— besok" : "—"} ${hms(active.countdown)}`;
      }

      const chips = [...document.querySelectorAll(".chip")];
      chips.forEach(c=>c.classList.remove("active"));
      if(active && !active.isTomorrow){
        const idx = ["Imsak","Subuh","Terbit","Dhuha","Zuhur","Ashar","Maghrib","Isya"].indexOf(active.name);
        if(idx >= 0 && chips[idx]) chips[idx].classList.add("active");
      }
    }, 500);
  }

  function bind(){
    el("provSelect").addEventListener("change", async (e)=>{
      await renderKabSelect(e.target.value);
    });

    el("loadBtn").addEventListener("click", async ()=>{
      await fetchMonth();
      startTicker();
    });

    el("dayPrevBtn").addEventListener("click", ()=>{
      state.viewDateISO = addDaysISO(state.viewDateISO, -1);
      renderTop();
    });
    el("dayNextBtn").addEventListener("click", ()=>{
      state.viewDateISO = addDaysISO(state.viewDateISO, 1);
      renderTop();
    });

    el("monthPrevBtn").addEventListener("click", ()=>{
      let m = Number(el("monthSelect").value);
      let y = Number(el("yearSelect").value);
      m -= 1;
      if(m===0){ m=12; y-=1; }
      el("monthSelect").value = String(m);
      el("yearSelect").value = String(y);
      fetchMonth();
    });

    el("monthNextBtn").addEventListener("click", ()=>{
      let m = Number(el("monthSelect").value);
      let y = Number(el("yearSelect").value);
      m += 1;
      if(m===13){ m=1; y+=1; }
      el("monthSelect").value = String(m);
      el("yearSelect").value = String(y);
      fetchMonth();
    });
  }

  async function boot(){
    initMonthYear();
    await loadProvinces();
    await renderKabSelect(el("provSelect").value);
    setDefaultMonthYearByTZ();
    bind();
    await fetchMonth();
    startTicker();
  }

  boot().catch(err=>{
    console.error(err);
    el("statusText").textContent = "Gagal memuat data. Buka DevTools > Console untuk lihat error.";
  });
</script>
</body>
</html>
